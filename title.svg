    <rect x="138" y="138" width="8" height="8"></rect>
    <rect x="166" y="126" width="8" height="8"></rect>
    <rect x="705" y="122" width="8" height="8"></rect>
    <rect x="735" y="142" width="8" height="8"></rect>
    <rect x="768" y="128" width="8" height="8"></rect>
  </g>

  <!-- Pulsar-like corner motifs -->
