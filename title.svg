    <rect x="848" y="98" width="7" height="7"></rect>
    <rect x="858" y="98" width="7" height="7"></rect>
  </g>

  <!-- Pixel-style title -->
  <text x="450" y="92" text-anchor="middle" dominant-baseline="middle" fill="#ffffff" font-family="Courier New, monospace" font-size="48" font-weight="700" letter-spacing="2">
