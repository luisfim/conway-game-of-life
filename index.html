<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <img class="title-image" src="title.svg" alt="Conway's Game of Life" />

    <section class="controls">
      <button id="playPauseButton">Play</button>
      <button id="stepButton">Step</button>
      <button id="randomButton">Randomize</button>
      <button id="clearButton">Clear</button>
      <button id="gridToggleButton">Grid: Off</button>

      <label>
        Speed:
        <input id="speedSlider" type="range" min="1" max="30" value="10" />
      </label>
      <label>
        Grid Size:
        <select id="gridSizeSelect">
          <option value="100">100 × 100</option>
          <option value="250">250 × 250</option>
          <option value="500">500 × 500</option>
          <option value="1000">1000 × 1000</option>
        </select>
      </label>
      <label>
        Pattern:
        <select id="patternSelect">
          <option value="glider">Glider</option>
          <option value="blinker">Blinker</option>
          <option value="pulsar">Pulsar</option>
          <option value="gosper">Gosper Glider Gun</option>
        </select>
      </label>

      <button id="placePatternButton">Place Pattern</button>
          </section>

    <section class="stats">
      <span>Generation: <strong id="generationText">0</strong></span>
      <span>
        Popu<button id="lauraEasterEggButton" class="secret-la-button" type="button">la</button>tion:
        <strong id="populationText">0</strong>
      </span>
    </section>

    <canvas id="gameCanvas" width="800" height="800"></canvas>
  </main>
  
  <a class="history-side-button" href="history.html">History</a>
  <script src="script.js"></script>
</body>
</html>
